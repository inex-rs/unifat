name: release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # OIDC token exchange for crates.io Trusted Publishing.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      # A re-pushed tag should skip, not fail, when the version is live.
      - name: Check whether this version is already on crates.io
        id: check
        run: |
          meta=$(cargo metadata --no-deps --format-version 1)
          name=$(jq -r '.packages[0].name' <<<"$meta")
          version=$(jq -r '.packages[0].version' <<<"$meta")
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "$name release workflow (github.com/${{ github.repository }})" \
            "https://crates.io/api/v1/crates/$name/$version")
          echo "$name@$version -> HTTP $code"
          echo "published=$([ "$code" = "200" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        if: steps.check.outputs.published == 'false'
      - run: cargo publish
        if: steps.check.outputs.published == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
